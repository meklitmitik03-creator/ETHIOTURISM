<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ethiopia Tourism</title>
<link rel="stylesheet" href="styles.css">
<style>
  body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 0;
  }

  header {
      background-color: #d84315;
      color: white;
      padding: 1rem;
      text-align: center;
  }

  header h1 {
      margin: 0;
      font-size: 2rem;
  }

  .card-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 2rem;
      gap: 20px;
  }

  .card {
      background-color: white;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      width: 250px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      overflow: hidden;
      text-decoration: none;
      color: black;
  }

  .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 16px rgba(0,0,0,0.3);
  }

  .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
  }

  .card h3 {
      margin: 1rem 0 0.5rem 0;
  }

  .card p {
      padding: 0 1rem 1rem 1rem;
      font-size: 0.9rem;
      color: #555;
  }
</style>
</head>
<body>

<header>
    <h1>Explore Ethiopia</h1>
</header>

<main>
    <div class="card-container">
        <!-- Lalibela Card -->
        <a href="lalibela.html" class="card">
            <img src="images/lalibela.jpg" alt="Lalibela">
            <h3>Lalibela</h3>
            <p>Ancient rock-hewn churches and spiritual heritage.</p>
        </a>

        <!-- Red Fox Card -->
        <a href="red-fox.html" class="card">
            <img src="images/redfox.jpg" alt="Red Fox">
            <h3>Red Fox</h3>
            <p>Native wildlife of Ethiopia's highlands.</p>
        </a>

        <!-- Simien Mountains Card -->
        <a href="simien.html" class="card">
            <img src="images/simien.jpg" alt="Simien Mountains">
            <h3>Simien Mountains</h3>
            <p>Breathtaking mountain landscapes and endemic species.</p>
        </a>

        <!-- Blue Nile Falls Card -->
        <a href="bluenile.html" class="card">
            <img src="images/bluenile.jpg" alt="Blue Nile Falls">
            <h3>Blue Nile Falls</h3>
            <p>Majestic waterfall in Bahir Dar region.</p>
        </a>
    </div>
</main>

</body>
</html>
